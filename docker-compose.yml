services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # SUPABASE_URL follows the project-root .env (e.g. a hosted project like
      # https://<ref>.supabase.co). It falls back to host.docker.internal:54321
      # for the LOCAL stack — inside a container the host-run `supabase start`
      # is reachable via host.docker.internal, not 127.0.0.1. The keys in .env
      # MUST belong to whichever project this URL points at, or PostgREST rejects
      # the JWT (PGRST301 "no suitable key").
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:54321}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    # Local dev uses the dev-server image (HMR). Production uses ./frontend/Dockerfile
    # (a static build) — see that file for the VITE_API_BASE_URL build-arg wiring.
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      # Vite bakes this into the bundle at container start. The BROWSER (on the
      # host / public internet) must be able to reach the backend at this URL.
      #  - Local dev: defaults to localhost:8000. To reach the dev stack from
      #    another device (e.g. over Tailscale), set VITE_API_BASE_URL in your
      #    shell or the project-root .env, e.g. http://100.103.149.17:8000.
      #  - Server: set VITE_API_BASE_URL in the project-root .env to the PUBLIC
      #    backend URL, e.g. http://madhats.getaiconsult.com.au:8000, then
      #    `docker compose up -d --force-recreate frontend`.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://111.118.194.148:8000}
      VITE_STORE_KEY: ${VITE_STORE_KEY:-mh_pk_madhats_local}
      # Set when serving the dev stack over HTTPS via `tailscale serve` so Vite
      # accepts the MagicDNS Host header and points HMR at wss://<host>:443.
      TAILSCALE_HOST: ${TAILSCALE_HOST:-}
      # Extra hostnames the Vite dev server accepts (comma-separated) when the
      # stack is fronted by a public domain, e.g.
      # ALLOWED_HOSTS=madhats.getaiconsult.com.au. Relaxes the host check only.
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-}
      # File events don't cross the Windows host → container boundary reliably;
      # poll so Vite HMR picks up source edits.
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app          # live source for HMR
      - /app/node_modules        # keep the container's Linux deps (don't shadow with host)
    depends_on:
      - backend

  # Periodically triggers the generation watchdog (reap stalled renders) and the
  # delivery backfill (retry undelivered previews) — both are admin self-heal
  # endpoints that need an external scheduler. A tiny curl-loop container reaches
  # the backend over the compose network. $${ADMIN_SECRET} is a literal `$` +
  # ${ADMIN_SECRET} so the SHELL expands it at runtime from .env (not compose).
  watchdog:
    image: curlimages/curl:8.11.1
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    entrypoint:
      - /bin/sh
      - -c
      - >
        while true; do
        curl -fsS -X POST -H "X-Admin-Secret: $${ADMIN_SECRET}"
        http://backend:8000/admin/generations/reap-stuck > /dev/null 2>&1 || true;
        curl -fsS -X POST -H "X-Admin-Secret: $${ADMIN_SECRET}"
        http://backend:8000/admin/deliveries/backfill > /dev/null 2>&1 || true;
        sleep 180;
        done
