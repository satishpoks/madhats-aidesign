services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Inside a container, the local Supabase stack (run on the host via
      # `supabase start`) is reachable via host.docker.internal, not 127.0.0.1.
      SUPABASE_URL: http://host.docker.internal:54321
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # The browser runs on the host, so it reaches the backend at localhost:8000.
      VITE_API_BASE_URL: http://localhost:8000
      VITE_STORE_KEY: mh_pk_madhats_local
      # File events don't cross the Windows host → container boundary reliably;
      # poll so Vite HMR picks up source edits.
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app          # live source for HMR
      - /app/node_modules        # keep the container's Linux deps (don't shadow with host)
    depends_on:
      - backend
